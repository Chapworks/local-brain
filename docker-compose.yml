services:
  postgres:
    image: ankane/pgvector:latest
    restart: unless-stopped
    environment:
      POSTGRES_DB: localbrain
      POSTGRES_USER: localbrain
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U localbrain"]
      interval: 10s
      timeout: 5s
      retries: 5

  mcp-server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./.env:/app/.env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: localbrain
      DB_USER: localbrain
      DB_PASSWORD: ${DB_PASSWORD}
      EMBEDDING_API_BASE: ${EMBEDDING_API_BASE:-https://openrouter.ai/api/v1}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-openai/text-embedding-3-small}
      CHAT_API_BASE: ${CHAT_API_BASE:-https://openrouter.ai/api/v1}
      CHAT_API_KEY: ${CHAT_API_KEY:-${EMBEDDING_API_KEY}}
      CHAT_MODEL: ${CHAT_MODEL:-openai/gpt-4o-mini}
      CHAT_API_FORMAT: ${CHAT_API_FORMAT:-openai}
      MCP_ACCESS_KEY: ${MCP_ACCESS_KEY}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      ADMIN_ACCESS_MODE: ${ADMIN_ACCESS_MODE:-local}
      DOCKER_API_URL: http://docker-proxy:2375
      PORT: 8000

  tunnel:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    depends_on:
      - mcp-server
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}

  docker-proxy:
    image: tecnativa/docker-socket-proxy:latest
    restart: unless-stopped
    environment:
      CONTAINERS: 1
      POST: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

volumes:
  pgdata:
