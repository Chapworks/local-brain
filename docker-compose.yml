services:
  postgres:
    image: ankane/pgvector:latest
    restart: unless-stopped
    environment:
      POSTGRES_DB: localbrain
      POSTGRES_USER: localbrain
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U localbrain"]
      interval: 10s
      timeout: 5s
      retries: 5

  mcp-server:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./.env:/app/.env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: localbrain
      DB_USER: localbrain
      DB_PASSWORD: ${DB_PASSWORD}
      EMBEDDING_API_BASE: ${EMBEDDING_API_BASE:-https://openrouter.ai/api/v1}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-openai/text-embedding-3-small}
      CHAT_API_BASE: ${CHAT_API_BASE:-https://openrouter.ai/api/v1}
      CHAT_API_KEY: ${CHAT_API_KEY:-${EMBEDDING_API_KEY}}
      CHAT_MODEL: ${CHAT_MODEL:-openai/gpt-4o-mini}
      CHAT_API_FORMAT: ${CHAT_API_FORMAT:-openai}
      MCP_ACCESS_KEY: ${MCP_ACCESS_KEY}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      ADMIN_ACCESS_MODE: ${ADMIN_ACCESS_MODE:-local}
      DOCKER_API_URL: http://docker-proxy:2375
      PORT: 8000

  tunnel:
    image: cloudflare/cloudflared:2025.2.1
    restart: unless-stopped
    depends_on:
      - mcp-server
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}

  db-backup:
    build:
      context: .
      dockerfile: scripts/Dockerfile.backup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: localbrain
      DB_USER: localbrain
      PGPASSWORD: ${DB_PASSWORD}
      BACKUP_RETAIN_COUNT: ${BACKUP_RETAIN_COUNT:-7}
      BACKUP_CRON: ${BACKUP_CRON:-0 3 * * *}
      BACKUP_ENCRYPTION_KEY: ${BACKUP_ENCRYPTION_KEY:-}
      RCLONE_REMOTE: ${RCLONE_REMOTE:-}
      BACKUP_CLOUD_RETAIN_COUNT: ${BACKUP_CLOUD_RETAIN_COUNT:-30}
      RCLONE_CONFIG_REMOTE_TYPE: ${RCLONE_CONFIG_REMOTE_TYPE:-}
      RCLONE_CONFIG_REMOTE_PROVIDER: ${RCLONE_CONFIG_REMOTE_PROVIDER:-}
      RCLONE_CONFIG_REMOTE_ACCESS_KEY_ID: ${RCLONE_CONFIG_REMOTE_ACCESS_KEY_ID:-}
      RCLONE_CONFIG_REMOTE_SECRET_ACCESS_KEY: ${RCLONE_CONFIG_REMOTE_SECRET_ACCESS_KEY:-}
      RCLONE_CONFIG_REMOTE_ENDPOINT: ${RCLONE_CONFIG_REMOTE_ENDPOINT:-}
      RCLONE_CONFIG_REMOTE_REGION: ${RCLONE_CONFIG_REMOTE_REGION:-}
      RCLONE_CONFIG_REMOTE_ACL: ${RCLONE_CONFIG_REMOTE_ACL:-private}
    volumes:
      - backups:/backups
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "$${BACKUP_CRON} /usr/local/bin/backup.sh >> /proc/1/fd/1 2>&1" > /tmp/crontab
        crontab /tmp/crontab
        echo "Backup cron scheduled: $${BACKUP_CRON}"
        /usr/local/bin/backup.sh
        crond -f

  docker-proxy:
    image: tecnativa/docker-socket-proxy:0.2.0
    restart: unless-stopped
    environment:
      CONTAINERS: 1
      POST: 1
      EXEC: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

volumes:
  pgdata:
  backups:
