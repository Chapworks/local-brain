# .github/workflows/release.yml
name: Release
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      IMAGE_BASE: ghcr.io/${{ github.repository }}
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image name
        run: echo "IMAGE_BASE=${IMAGE_BASE,,}" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push MCP server image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}:${{ github.ref_name }}
            ${{ env.IMAGE_BASE }}:latest

      - name: Build and push backup image
        uses: docker/build-push-action@v5
        with:
          context: ./scripts
          file: ./scripts/Dockerfile.backup
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}-backup:${{ github.ref_name }}
            ${{ env.IMAGE_BASE }}-backup:latest
