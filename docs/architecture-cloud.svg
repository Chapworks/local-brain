<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgCloud" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="480" rx="12" fill="url(#bgCloud)"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" fill="#f1f5f9" font-size="18" font-weight="700">Local Brain — Cloud VM Install (Caddy + Let's Encrypt)</text>

  <!-- Internet zone -->
  <rect x="30" y="56" width="740" height="80" rx="8" fill="none" stroke="#475569" stroke-dasharray="6,4" stroke-width="1"/>
  <text x="50" y="74" fill="#64748b" font-size="11" font-weight="600">INTERNET</text>

  <!-- MCP Clients -->
  <rect x="50" y="82" width="160" height="40" rx="6" fill="#1e3a5f"/>
  <text x="130" y="107" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="600">MCP Clients</text>

  <!-- Browser -->
  <rect x="240" y="82" width="140" height="40" rx="6" fill="#1e3a5f"/>
  <text x="310" y="107" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="600">Browser (Admin)</text>

  <!-- AI APIs -->
  <rect x="550" y="82" width="200" height="40" rx="6" fill="#4a1d96" fill-opacity="0.3" stroke="#8b5cf6" stroke-width="1"/>
  <text x="650" y="102" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="600">AI APIs</text>
  <text x="650" y="116" text-anchor="middle" fill="#a78bfa" font-size="9">OpenRouter · OpenAI · Anthropic</text>

  <!-- Cloud VM zone -->
  <rect x="30" y="150" width="740" height="310" rx="8" fill="none" stroke="#f59e0b" stroke-opacity="0.3" stroke-width="1.5"/>
  <text x="50" y="168" fill="#fcd34d" font-size="11" font-weight="600">CLOUD VM — ports 80, 443, 22 open · UFW firewall</text>

  <!-- Docker zone -->
  <rect x="50" y="180" width="700" height="260" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="70" y="198" fill="#94a3b8" font-size="11" font-weight="600">DOCKER COMPOSE</text>

  <!-- Caddy container -->
  <rect x="80" y="210" width="200" height="60" rx="6" fill="#065f46" stroke="#22c55e" stroke-width="1"/>
  <text x="180" y="234" text-anchor="middle" fill="#6ee7b7" font-size="13" font-weight="700">Caddy</text>
  <text x="180" y="252" text-anchor="middle" fill="#4ade80" font-size="10">:80 :443 · Let's Encrypt auto-HTTPS</text>

  <!-- Arrows: Clients → Caddy -->
  <line x1="130" y1="122" x2="150" y2="208" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arrowC)"/>
  <text x="120" y="168" fill="#64748b" font-size="10">HTTPS</text>

  <line x1="310" y1="122" x2="200" y2="208" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arrowC)"/>

  <!-- MCP Server container -->
  <rect x="340" y="210" width="280" height="60" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="480" y="234" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">Deno MCP Server</text>
  <text x="480" y="252" text-anchor="middle" fill="#60a5fa" font-size="10">:8000 · MCP tools + Admin UI + /health</text>

  <!-- Arrow: Caddy → MCP Server -->
  <line x1="280" y1="240" x2="338" y2="240" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arrowC)"/>
  <text x="310" y="233" text-anchor="middle" fill="#64748b" font-size="10">HTTP</text>

  <!-- Arrow: MCP → AI APIs -->
  <line x1="580" y1="220" x2="650" y2="124" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arrowVioletC)"/>
  <text x="630" y="172" text-anchor="middle" fill="#64748b" font-size="10">outbound</text>

  <!-- PostgreSQL container -->
  <rect x="140" y="310" width="210" height="70" rx="6" fill="#164e63" stroke="#06b6d4" stroke-width="1"/>
  <text x="245" y="336" text-anchor="middle" fill="#67e8f9" font-size="13" font-weight="700">PostgreSQL + pgvector</text>
  <text x="245" y="354" text-anchor="middle" fill="#22d3ee" font-size="10">:5432 · internal only</text>
  <text x="245" y="368" text-anchor="middle" fill="#06b6d4" font-size="10">thoughts · admin_users · vectors</text>

  <!-- Arrow: MCP → PostgreSQL -->
  <line x1="400" y1="270" x2="300" y2="308" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrowCyanC)"/>
  <text x="360" y="292" text-anchor="middle" fill="#64748b" font-size="10">SQL</text>

  <!-- Docker Proxy container -->
  <rect x="440" y="310" width="210" height="70" rx="6" fill="#422006" stroke="#f59e0b" stroke-width="1"/>
  <text x="545" y="336" text-anchor="middle" fill="#fcd34d" font-size="13" font-weight="600">Docker Socket Proxy</text>
  <text x="545" y="354" text-anchor="middle" fill="#f59e0b" font-size="10">:2375 · internal only</text>
  <text x="545" y="368" text-anchor="middle" fill="#d97706" font-size="10">containers + restart only</text>

  <!-- Arrow: MCP → Docker Proxy -->
  <line x1="540" y1="270" x2="545" y2="308" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrowYellowC)"/>
  <text x="555" y="292" text-anchor="middle" fill="#64748b" font-size="10">logs/restart</text>

  <!-- Docker socket -->
  <rect x="480" y="400" width="130" height="30" rx="4" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="545" y="420" text-anchor="middle" fill="#94a3b8" font-size="10">docker.sock (ro)</text>

  <!-- Arrow: Socket → Proxy -->
  <line x1="545" y1="400" x2="545" y2="382" stroke="#475569" stroke-width="1" marker-end="url(#arrowGrayC)"/>

  <!-- pgdata volume -->
  <rect x="180" y="400" width="130" height="30" rx="4" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="245" y="420" text-anchor="middle" fill="#94a3b8" font-size="10">pgdata volume</text>

  <!-- Arrow: Volume → PG -->
  <line x1="245" y1="400" x2="245" y2="382" stroke="#475569" stroke-width="1" marker-end="url(#arrowGrayC)"/>

  <!-- caddy volumes -->
  <rect x="70" y="400" width="90" height="30" rx="4" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="115" y="420" text-anchor="middle" fill="#94a3b8" font-size="10">caddy_data</text>

  <!-- Arrow: caddy_data → Caddy -->
  <line x1="115" y1="400" x2="150" y2="272" stroke="#475569" stroke-width="1" marker-end="url(#arrowGrayC)"/>

  <!-- Legend -->
  <text x="70" y="456" fill="#64748b" font-size="10">Yellow border = cloud VM boundary · Green = Caddy (HTTPS) · Blue = application · Cyan = database · Yellow = Docker management</text>
  <text x="70" y="472" fill="#64748b" font-size="10">Caddy auto-provisions Let's Encrypt certificates. No Cloudflare required. Firewall restricts to ports 22, 80, 443.</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowC" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#60a5fa"/>
    </marker>
    <marker id="arrowCyanC" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#22d3ee"/>
    </marker>
    <marker id="arrowYellowC" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f59e0b"/>
    </marker>
    <marker id="arrowVioletC" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#8b5cf6"/>
    </marker>
    <marker id="arrowGrayC" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#475569"/>
    </marker>
  </defs>
</svg>
